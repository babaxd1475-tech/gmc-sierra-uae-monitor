name: GMC Sierra UAE Monitor

on:
  schedule:
    # Every 15 minutes (UTC)
    - cron: '*/15 * * * *'
  workflow_dispatch:  # Lets you trigger manually from the Actions tab

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit seen_listings.json back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      - name: Commit updated seen_listings.json (if changed)
        run: |
          if [ -f seen_listings.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add seen_listings.json
            git diff --staged --quiet || git commit -m "chore: update seen_listings [skip ci]"
            git push
          fi
